<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUD/JPY Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040407;
  --panel: #0a0a10;
  --panel2: #0e0e16;
  --border: #16162a;
  --border2: #1e1e35;
  --cyan: #00e5ff;
  --green: #00ff88;
  --red: #ff2d55;
  --yellow: #ffd60a;
  --purple: #bf5af2;
  --text: #d0d8f0;
  --dim: #404060;
  --dim2: #606080;
  --white: #ffffff;
  --font-jp: 'Zen Kaku Gothic New', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-display: 'Bebas Neue', cursive;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-jp);}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.04) 0%, transparent 60%),
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,229,255,0.012) 40px,rgba(0,229,255,0.012) 41px);
  pointer-events:none;z-index:0;}

/* ===== HEADER ===== */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(4,4,7,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
}
.logo{font-family:var(--font-display);font-size:22px;letter-spacing:0.08em;color:var(--white);}
.logo span{color:var(--cyan);}
.header-price{font-family:var(--font-display);font-size:26px;letter-spacing:0.04em;}
.header-price.up{color:var(--green);}
.header-price.down{color:var(--red);}
.header-right{display:flex;align-items:center;gap:16px;}
.live-badge{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim2);letter-spacing:0.1em;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#header-time{font-family:var(--font-mono);font-size:12px;color:var(--dim2);}

/* ===== MOBILE TABS ===== */
.mob-tabs{
  display:none;
  position:sticky;top:52px;z-index:99;
  background:rgba(4,4,7,0.95);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border2);
  grid-template-columns:repeat(4,1fr);
}
.mob-tab{
  padding:10px 4px;text-align:center;font-size:11px;color:var(--dim2);
  cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;letter-spacing:0.05em;
}
.mob-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* ===== LAYOUT ===== */
.layout{
  display:grid;
  grid-template-columns:280px 1fr 300px;
  gap:0;
  min-height:calc(100vh - 52px);
  position:relative;z-index:1;
}
.col{padding:16px 14px;border-right:1px solid var(--border);}
.col:last-child{border-right:none;}
.col-center{padding:16px 16px;}

/* ===== SECTION TITLE ===== */
.sec-title{
  font-size:9px;letter-spacing:0.2em;color:var(--dim2);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border2);}

/* ===== CARDS ===== */
.card{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:10px;padding:14px;margin-bottom:10px;
  position:relative;overflow:hidden;
}
.card-sm{padding:10px 12px;margin-bottom:8px;}

/* ===== LEFT: REPORTS ===== */
.report-link{
  display:block;background:var(--panel);border:1px solid var(--border2);
  border-radius:8px;padding:12px;margin-bottom:8px;
  text-decoration:none;color:inherit;transition:all 0.2s;
  position:relative;overflow:hidden;
}
.report-link::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--border2);transition:background 0.2s;
}
.report-link:hover{border-color:var(--cyan);background:rgba(0,229,255,0.04);}
.report-link:hover::before{background:var(--cyan);}
.report-src{font-size:9px;color:var(--dim2);letter-spacing:0.1em;margin-bottom:4px;}
.report-title{font-size:12px;color:var(--text);line-height:1.5;font-weight:700;}
.report-date{font-size:10px;color:var(--dim);margin-top:4px;font-family:var(--font-mono);}
.report-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;}
.report-link:hover .report-arrow{color:var(--cyan);}

/* ===== CENTER: SIGNAL ===== */
.mode-bar{
  border-radius:8px;padding:10px 16px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--font-display);font-size:16px;letter-spacing:0.1em;
  transition:all 0.4s;
}
.mode-bar.trend-down{background:rgba(255,45,85,0.1);border:1px solid rgba(255,45,85,0.35);color:var(--red);}
.mode-bar.trend-up{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.35);color:var(--green);}
.mode-bar.range{background:rgba(255,214,10,0.08);border:1px solid rgba(255,214,10,0.3);color:var(--yellow);}
.mode-bar.unknown{background:var(--panel);border:1px solid var(--border2);color:var(--dim2);}
.mode-sub{font-family:var(--font-mono);font-size:10px;opacity:0.7;}

.price-big{font-family:var(--font-display);font-size:56px;letter-spacing:0.02em;line-height:1;}
.price-big.up{color:var(--green);}
.price-big.down{color:var(--red);}
.price-big.flat{color:var(--white);}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-item{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.stat-lbl{font-size:9px;color:var(--dim2);letter-spacing:0.1em;margin-bottom:4px;}
.stat-val{font-family:var(--font-display);font-size:18px;letter-spacing:0.03em;}

.cond-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.cond-row:last-child{border:none;}
.cond-lbl{color:var(--dim2);}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;letter-spacing:0.04em;}
.badge.ok{background:rgba(0,255,136,0.12);color:var(--green);}
.badge.ng{background:rgba(255,45,85,0.12);color:var(--red);}

/* Signal box */
.signal-box{
  border-radius:10px;padding:18px;text-align:center;
  margin-bottom:10px;transition:all 0.4s;
}
.signal-box.standby{background:var(--panel);border:1px solid var(--border2);}
.signal-box.approaching{background:rgba(255,214,10,0.05);border:1px solid rgba(255,214,10,0.3);}
.signal-box.sell{background:rgba(255,45,85,0.08);border:2px solid var(--red);animation:glow-r 1.5s ease-in-out infinite alternate;}
.signal-box.buy{background:rgba(0,255,136,0.08);border:2px solid var(--green);animation:glow-g 1.5s ease-in-out infinite alternate;}
@keyframes glow-r{from{box-shadow:0 0 15px rgba(255,45,85,0.1)}to{box-shadow:0 0 35px rgba(255,45,85,0.3)}}
@keyframes glow-g{from{box-shadow:0 0 15px rgba(0,255,136,0.1)}to{box-shadow:0 0 35px rgba(0,255,136,0.3)}}
.signal-tag{font-size:9px;letter-spacing:0.2em;color:var(--dim2);margin-bottom:6px;}
.signal-main{font-family:var(--font-display);font-size:32px;letter-spacing:0.08em;}
.signal-sub{font-size:11px;color:var(--dim2);margin-top:5px;}

.levels-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.level-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.level-lbl{font-size:9px;color:var(--dim2);letter-spacing:0.08em;margin-bottom:3px;}
.level-val{font-family:var(--font-display);font-size:17px;}

/* Range bar */
.range-wrap{margin-bottom:10px;}
.range-bar{position:relative;height:6px;background:var(--border2);border-radius:3px;margin:8px 0;}
.range-ptr{position:absolute;top:-5px;width:16px;height:16px;border-radius:50%;transform:translateX(-50%);border:2px solid var(--bg);transition:left 0.5s,background 0.3s;}
.range-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);}
  .range-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);}

.tf-btn,.ind-btn{
  padding:6px 12px;border:1px solid var(--border2);border-radius:6px;
  background:var(--panel2);color:var(--dim2);font-family:var(--font-jp);
  font-size:11px;cursor:pointer;transition:all 0.15s;
}
.tf-btn:hover,.ind-btn:hover{border-color:var(--cyan);color:var(--text);}
.tf-btn.active{background:rgba(0,229,255,0.12);border-color:var(--cyan);color:var(--cyan);}
.ind-btn.active{background:rgba(0,255,136,0.1);border-color:var(--green);color:var(--green);}

/* ===== TRADE LOG ===== */
.trade-form{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.trade-btn{
  padding:9px;border:1px solid var(--border2);border-radius:7px;
  background:var(--panel2);color:var(--text);font-family:var(--font-jp);
  font-size:11px;cursor:pointer;transition:all 0.15s;
}
.trade-btn:hover{border-color:var(--cyan);}
.trade-btn.win{background:rgba(0,255,136,0.1);border-color:var(--green);color:var(--green);}
.trade-btn.lose{background:rgba(255,45,85,0.1);border-color:var(--red);color:var(--red);}

.trade-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.trade-stat{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px;text-align:center;}
.trade-stat .lbl{font-size:9px;color:var(--dim2);letter-spacing:0.05em;margin-bottom:3px;}
.trade-stat .val{font-family:var(--font-display);font-size:20px;}

.trade-list{max-height:200px;overflow-y:auto;}
.trade-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;}
.trade-item:last-child{border:none;}
.trade-time{color:var(--dim);font-family:var(--font-mono);font-size:10px;}
.trade-result{padding:1px 8px;border-radius:3px;font-size:10px;}
.trade-result.w{background:rgba(0,255,136,0.12);color:var(--green);}
.trade-result.l{background:rgba(255,45,85,0.12);color:var(--red);}

/* ===== RIGHT: INDICATORS + NEWS ===== */
.indicator-item{
  background:var(--panel2);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;margin-bottom:7px;
}
.ind-time{font-family:var(--font-mono);font-size:10px;color:var(--cyan);margin-bottom:3px;}
.ind-name{font-size:12px;font-weight:700;margin-bottom:4px;}
.ind-impact{display:inline-block;font-size:9px;padding:1px 7px;border-radius:3px;margin-bottom:4px;letter-spacing:0.05em;}
.ind-impact.high{background:rgba(255,45,85,0.15);color:var(--red);}
.ind-impact.mid{background:rgba(255,214,10,0.12);color:var(--yellow);}
.ind-impact.low{background:rgba(0,229,255,0.1);color:var(--cyan);}
.ind-summary{font-size:11px;color:var(--dim2);line-height:1.6;}

/* Tooltip for glossary */
.term{
  border-bottom:1px dashed var(--cyan);color:var(--cyan);cursor:pointer;
  position:relative;
}
.tooltip{
  display:none;position:absolute;left:0;top:100%;margin-top:4px;
  background:#111120;border:1px solid var(--cyan);border-radius:6px;
  padding:8px 10px;font-size:10px;color:var(--text);line-height:1.6;
  width:220px;z-index:200;box-shadow:0 4px 20px rgba(0,229,255,0.15);
  white-space:normal;
}
.term:hover .tooltip,.term.open .tooltip{display:block;}

.news-summary{
  background:linear-gradient(135deg, rgba(0,229,255,0.05), rgba(191,90,242,0.05));
  border:1px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:10px;
}
.news-tag{font-size:9px;letter-spacing:0.15em;color:var(--purple);margin-bottom:8px;}
.news-text{font-size:12px;line-height:1.9;color:var(--text);}

/* Log */
.log-wrap{max-height:120px;overflow-y:auto;}
.log-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:10px;}
.log-row:last-child{border:none;}
.log-t{color:var(--dim);font-family:var(--font-mono);min-width:50px;}
.log-m{flex:1;}
.log-m.s{color:var(--green);}
.log-m.b{color:var(--red);}
.log-m.w{color:var(--yellow);}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
  .col,.col-center{border-right:none;border-bottom:1px solid var(--border);}
  .mob-tabs{display:grid;}
  .col[data-col]{display:none;}
  .col[data-col].active,.col-center[data-col].active{display:block;}
  .layout{min-height:auto;}
}
@media(max-width:600px){
  .price-big{font-size:44px;}
  .signal-main{font-size:26px;}
}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">AUD<span>/JPY</span></div>
  <div class="header-price flat" id="h-price">---.---</div>
  <div class="header-right">
    <div class="live-badge"><span class="dot"></span>LIVE</div>
    <div id="header-time">--:--:--</div>
  </div>
</header>

<!-- MOBILE TABS -->
<div class="mob-tabs">
  <div class="mob-tab active" onclick="switchTab(0)">レポート</div>
  <div class="mob-tab" onclick="switchTab(1)">シグナル</div>
  <div class="mob-tab" onclick="switchTab(2)">指標</div>
  <div class="mob-tab" onclick="switchTab(3)">記録</div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- ===== LEFT: REPORTS ===== -->
  <div class="col" data-col="0" style="display:block">
    <div class="sec-title">// マーケットレポート</div>

    <div id="report-links"></div>

    <div style="margin-top:14px;">
      <div class="sec-title">// アクティビティログ</div>
      <div class="log-wrap" id="log-list"></div>
    </div>
  </div>

  <!-- ===== CENTER: SIGNAL + RECORD ===== -->
  <div class="col-center" data-col="1" style="display:block">

   

    <!-- Price -->
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;">
        <div>
          <div class="sec-title" style="margin-bottom:4px;">現在値</div>
          <div class="price-big flat" id="price-big">読込中...</div>
        </div>
        <div style="padding-bottom:6px;">
          <div style="font-size:11px;color:var(--dim2);">変化 <span id="p-change" style="color:var(--text)">--</span></div>
          <div style="font-size:11px;color:var(--dim2);">更新 <span id="p-update" style="color:var(--text)">--</span></div>
        </div>
      </div>
    </div>

<!-- Chart -->
    <div class="card" style="margin-bottom:10px;padding:10px;overflow:hidden;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
        <button class="tf-btn" data-tf="5">5分</button>
        <button class="tf-btn" data-tf="60">1時間</button>
        <button class="tf-btn" data-tf="240">4時間</button>
        <button class="tf-btn" data-tf="D">日足</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
        <button class="ind-btn" data-ind="ema9">EMA9</button>
        <button class="ind-btn" data-ind="ema20">EMA20</button>
        <button class="ind-btn" data-ind="ema50">EMA50</button>
        <button class="ind-btn" data-ind="adx">ADX</button>
        <button class="ind-btn" data-ind="macd">MACD</button>
      </div>
      <div id="tv_chart" style="height:420px;"></div>
    </div>

    <!-- Trade Record -->
    <div class="card" style="margin-top:4px;" data-col="3">
      <div class="sec-title">// トレード記録</div>
      <div class="trade-stats">
        <div class="trade-stat">
          <div class="lbl">総トレード</div>
          <div class="val" id="t-total" style="color:var(--cyan)">0</div>
        </div>
        <div class="trade-stat">
          <div class="lbl">勝率</div>
          <div class="val" id="t-rate" style="color:var(--green)">--%</div>
        </div>
        <div class="trade-stat">
          <div class="lbl">累計pips</div>
          <div class="val" id="t-pips" style="color:var(--text)">0</div>
        </div>
      </div>
      <div class="trade-form">
        <button class="trade-btn win" onclick="addTrade('win')">✓ 利確 +15p</button>
        <button class="trade-btn lose" onclick="addTrade('lose')">✗ 損切り -5p</button>
      </div>
      <div class="trade-list" id="trade-list"></div>
      <button onclick="clearTrades()" style="margin-top:8px;width:100%;padding:6px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--dim);font-size:10px;cursor:pointer;font-family:var(--font-jp);">記録をリセット</button>
    </div>
  </div>

  <!-- ===== RIGHT: INDICATORS ===== -->
 <div class="col" data-col="2" style="display:block">
    <div style="margin-top:4px;">
      
      <div class="sec-title">// AI マーケット要約</div>
      <div class="news-summary">
        <div class="news-tag">// TODAY'S BRIEF</div>
        <div class="news-text" id="ai-summary">読込中...</div>
      </div>
      <div style="font-size:9px;color:var(--dim);text-align:center;margin-top:-4px;margin-bottom:10px;">※ 用語をタップすると解説が表示されます</div>
    </div>
  </div>

</div><!-- /layout -->

<script>
// ========== STATE ==========
let prices = [];
let logs = [];
let fetchCount = 0;
let trades = JSON.parse(localStorage.getItem('trades') || '[]');

function fmt(n){ return n ? n.toFixed(3) : '--'; }
function pip(a,b){ return Math.round((a-b)*100); }
function nowStr(){ return new Date().toLocaleTimeString('ja-JP',{hour12:false}); }

// ========== CLOCK ==========
function tick(){
  const d = new Date();
  document.getElementById('header-time').textContent = d.toLocaleTimeString('ja-JP',{hour12:false});
}
setInterval(tick,1000); tick();

// ========== MOBILE TABS ==========
function switchTab(i){
  document.querySelectorAll('.mob-tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  // map tab index to data-col
  const map = [0,1,2,3];
  document.querySelectorAll('[data-col]').forEach(el=>{
    const c = parseInt(el.getAttribute('data-col'));
    el.classList.toggle('active', c === map[i]);
  });
}
// Init mobile: show col 1 (signal) by default on mobile, but all on desktop
function initTabs(){
  if(window.innerWidth <= 900){
    document.querySelectorAll('[data-col]').forEach(el => el.classList.remove('active'));
    // show signal (col 1) by default
    document.querySelectorAll('[data-col="1"]').forEach(el => el.classList.add('active'));
    document.querySelectorAll('.mob-tab').forEach((t,i)=>t.classList.toggle('active',i===1));
    switchTab(1);
  }
}
window.addEventListener('resize', initTabs);
initTabs();

// ========== LOG ==========
function addLog(msg, type=''){
  logs.unshift({t:nowStr(),msg,type});
  if(logs.length>12) logs.pop();
  const el = document.getElementById('log-list');
  el.innerHTML = logs.map(l=>`<div class="log-row"><span class="log-t">${l.t}</span><span class="log-m ${l.type}">${l.msg}</span></div>`).join('');
}

// ========== REPORT LINKS ==========
function buildReports(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ymd = `${d.getFullYear()}_${pad(d.getMonth()+1)}_${pad(d.getDate())}`;
  const ymdDash = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const sources = [
    {
      src:'OANDA',
      title:`豪ドル/円 見通し（${d.getMonth()+1}月${d.getDate()}日）`,
      url:`https://www.oanda.jp/lab-education/market_news/${ymd}_audjpy/`,
      desc:'注文状況・テクニカル分析・経済指標'
    },
    {
      src:'みんかぶFX',
      title:`豪ドル円 本日の見通し`,
      url:`https://fx.minkabu.jp/pair/AUDJPY`,
      desc:'チャート・ピポット・予想レンジ'
    },
    {
      src:'ヒロセ通商',
      title:`豪ドル円 マーケット情報`,
      url:`https://hirose-fx.co.jp/market/`,
      desc:'テクニカル・ファンダメンタル分析'
    },
    {
      src:'外為どっとコム',
      title:`豪ドル円 マーケット分析`,
      url:`https://www.gaitame.com/market/`,
      desc:'チャート・注目ポイント・注文状況'
    },
    {
      src:'SBI FXトレード',
      title:`AUD/JPY マーケット情報`,
      url:`https://www.sbifxt.co.jp/market/`,
      desc:'ストラテジスト分析・チャート'
    },
    {
      src:'マネックス証券',
      title:`豪ドル円 デイリーレポート`,
      url:`https://www.monex.co.jp/market/fx/`,
      desc:'日次レポート・為替見通し'
    },
    {
      src:'Bloomberg',
      title:`為替マーケット総合`,
      url:`https://www.bloomberg.co.jp/markets/currencies`,
      desc:'主要通貨ペア・マーケット概況'
    },
  ];
  const el = document.getElementById('report-links');
  el.innerHTML = sources.map(s=>`
    <a href="${s.url}" target="_blank" rel="noopener" class="report-link">
      <div class="report-src">${s.src}</div>
      <div class="report-title">${s.title}</div>
      <div class="report-date">${s.desc}</div>
      <span class="report-arrow">→</span>
    </a>
  `).join('');
}
buildReports();

// ========== INDICATORS ==========

// ========== TRADE RECORD ==========
function saveTrades(){ localStorage.setItem('trades', JSON.stringify(trades)); }

function addTrade(result){
  const now = new Date();
  trades.unshift({
    t: now.toLocaleTimeString('ja-JP',{hour12:false,hour:'2-digit',minute:'2-digit'}),
    r: result,
    p: result==='win' ? 15 : -5
  });
  if(trades.length > 50) trades.pop();
  saveTrades();
  renderTrades();
  addLog(result==='win' ? '✓ 利確 +15p 記録' : '✗ 損切り -5p 記録', result==='win'?'s':'b');
}

function clearTrades(){
  if(!confirm('記録をリセットしますか？')) return;
  trades = []; saveTrades(); renderTrades();
}

function renderTrades(){
  const wins = trades.filter(t=>t.r==='win').length;
  const total = trades.length;
  const pips = trades.reduce((a,t)=>a+t.p,0);
  document.getElementById('t-total').textContent = total;
  document.getElementById('t-rate').textContent = total ? Math.round(wins/total*100)+'%' : '--%';
  const pe = document.getElementById('t-pips');
  pe.textContent = (pips>=0?'+':'')+pips;
  pe.style.color = pips>0?'var(--green)':pips<0?'var(--red)':'var(--text)';
  document.getElementById('trade-list').innerHTML = trades.slice(0,20).map(t=>`
    <div class="trade-item">
      <span class="trade-time">${t.t}</span>
      <span class="trade-result ${t.r==='win'?'w':'l'}">${t.r==='win'?'+15p':'-5p'}</span>
    </div>`).join('');
}
renderTrades();

function updateUI(price, prev){
  const ch = price - prev;
  const p = Math.round(ch*100);
  const dir = p>0?'up':p<0?'down':'flat';

  const hp = document.getElementById('h-price');
  hp.textContent = fmt(price);
  hp.className = 'header-price '+dir;

  const bp = document.getElementById('price-big');
  bp.textContent = fmt(price);
  bp.className = 'price-big '+dir;

  const chEl = document.getElementById('p-change');
  chEl.textContent = (p>=0?'+':'')+p+'p';
  chEl.style.color = p>0?'var(--green)':p<0?'var(--red)':'var(--text)';
  document.getElementById('p-update').textContent = nowStr();

  if(fetchCount%5===0) addLog(`更新 ${fmt(price)} (${p>=0?'+':''}${p}p)`);
}

// ========== FETCH ==========
async function fetchPrice(){
  try {
    const res = await fetch('/api');
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    const price = data.price;
    const prev = prices.length>0 ? prices[prices.length-1].price : price;
    prices.push({time:Date.now(),price});
    if(prices.length>200) prices.shift();
    fetchCount++;
    updateUI(price, prev);
  } catch(e){
    addLog('サーバー未起動? '+e.message,'w');
    document.getElementById('price-big').textContent='サーバー起動待ち';
  }
}
addLog('ダッシュボード起動');
fetchPrice();
setInterval(fetchPrice, 10000);
</script>

<script>
const STUDY_MAP = {
  ema9:  {id:"MAExp@tv-basicstudies", inputs:{length:9}},
  ema20: {id:"MAExp@tv-basicstudies", inputs:{length:20}},
  ema50: {id:"MAExp@tv-basicstudies", inputs:{length:50}},
  adx:   {id:"ADX@tv-basicstudies", inputs:{}},
  macd:  {id:"MACD@tv-basicstudies", inputs:{}}
};

let chartTf = localStorage.getItem('chart_tf') || '60';
let chartInds = JSON.parse(localStorage.getItem('chart_inds') || '["ema20","ema50"]');

function renderChart(){
  document.getElementById('tv_chart').innerHTML = '';
  new TradingView.widget({
    autosize: true,
    symbol: "FX:AUDJPY",
    interval: chartTf,
    timezone: "Asia/Tokyo",
    theme: "dark",
    style: "1",
    locale: "ja",
    toolbar_bg: "#0a0a10",
    enable_publishing: false,
    hide_top_toolbar: false,
    hide_legend: false,
    save_image: false,
    studies: chartInds.map(k => STUDY_MAP[k]),
    container_id: "tv_chart"
  });
}

function initChartControls(){
  document.querySelectorAll('.tf-btn').forEach(btn=>{
    if(btn.dataset.tf === chartTf) btn.classList.add('active');
    btn.addEventListener('click', ()=>{
      chartTf = btn.dataset.tf;
      localStorage.setItem('chart_tf', chartTf);
      document.querySelectorAll('.tf-btn').forEach(b=>b.classList.toggle('active', b===btn));
      renderChart();
    });
  });
  document.querySelectorAll('.ind-btn').forEach(btn=>{
    if(chartInds.includes(btn.dataset.ind)) btn.classList.add('active');
    btn.addEventListener('click', ()=>{
      const k = btn.dataset.ind;
      if(chartInds.includes(k)){
        chartInds = chartInds.filter(x=>x!==k);
        btn.classList.remove('active');
      } else {
        chartInds.push(k);
        btn.classList.add('active');
      }
      localStorage.setItem('chart_inds', JSON.stringify(chartInds));
      renderChart();
    });
  });
}

initChartControls();
renderChart();
</script>
